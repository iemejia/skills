name: Semantic PR Validation

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened
      - ready_for_review

permissions:
  issues: write
  pull-requests: write

jobs:
  check_pr_title:
    name: Check Pull Request Title
    runs-on: ubuntu-latest
    steps:
      - name: Validate conventional commit format
        id: validation
        uses: actions/github-script@v7
        with:
          script: |
            const prTitle = context.payload.pull_request.title;
            const regex = /^(feat|fix|docs|style|refactor|perf|test|chore|build|ci|revert)(\([^)]+\))?(!?): .+/;

            if (!regex.test(prTitle)) {
              core.setFailed('PR title does not follow Conventional Commits. See comment for details.');
            }

      - name: Comment on invalid title
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- semantic-pr-comment -->';
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            if (comments.some(c => c.body.includes(marker))) return;

            const message = `${marker}

            Pull request titles must follow [Conventional Commits](https://www.conventionalcommits.org/).

            **Format:** \`type(scope): description\`

            **Valid types:**
            - \`feat\` — new skill content, rules, or references
            - \`fix\` — correct inaccurate guidance or broken links
            - \`docs\` — README, AGENTS.md, or non-skill documentation
            - \`style\` — formatting, no content change
            - \`refactor\` — restructure content without changing meaning
            - \`perf\` — improve progressive disclosure or reduce token usage
            - \`test\` — CI validation or eval changes
            - \`chore\` — maintenance, version bumps, deps
            - \`build\` — build system or script changes
            - \`ci\` — CI/CD workflow configuration
            - \`revert\` — revert a previous commit

            **Examples:**
            - \`feat(microsoft-writing-style): add accessibility writing rules\`
            - \`fix(microsoft-writing-style): correct capitalization guidance\`
            - \`docs: update installation instructions in README\`
            - \`chore: bump skill version to 1.1\``;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message,
            });

      - name: Clean up on valid title
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            if (labels.some(l => l.name === 'invalid-title')) {
              await github.rest.issues.removeLabel({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'invalid-title',
              });
            }
