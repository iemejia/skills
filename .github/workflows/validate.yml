name: "Tier 1+2: Skill Validation"

on:
  pull_request:
    paths:
      - "*/SKILL.md"
      - "*/references/**"
      - "*/scripts/**"
      - "README.md"
  push:
    branches: [main]
    paths:
      - "*/SKILL.md"
      - "*/references/**"
      - "*/scripts/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  structural:
    name: Structural Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Discover and validate all skills
        run: |
          ERRORS=0

          # Find all skill directories (contain SKILL.md)
          for skill_md in */SKILL.md; do
            SKILL_DIR=$(dirname "$skill_md")
            echo "--- Validating skill: $SKILL_DIR ---"

            # Check frontmatter exists
            if ! head -1 "$skill_md" | grep -q "^---"; then
              echo "::error file=$skill_md::SKILL.md missing YAML frontmatter"
              ERRORS=1
              continue
            fi

            # Extract frontmatter
            FRONTMATTER=$(sed -n '/^---$/,/^---$/p' "$skill_md" | sed '1d;$d')

            # Validate 'name' field exists and matches directory
            NAME=$(echo "$FRONTMATTER" | grep '^name:' | sed 's/name: *//' | tr -d '"')
            if [ -z "$NAME" ]; then
              echo "::error file=$skill_md::Missing 'name' field in frontmatter"
              ERRORS=1
              continue
            fi
            if [ "$NAME" != "$SKILL_DIR" ]; then
              echo "::error file=$skill_md::name field '$NAME' does not match directory name '$SKILL_DIR'"
              ERRORS=1
            fi

            # Validate name format: lowercase alphanumeric + hyphens, no start/end hyphen
            if ! echo "$NAME" | grep -qE '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'; then
              echo "::error file=$skill_md::name '$NAME' does not match spec (lowercase, hyphens, no leading/trailing hyphen)"
              ERRORS=1
            fi
            if echo "$NAME" | grep -q '\-\-'; then
              echo "::error file=$skill_md::name '$NAME' contains consecutive hyphens"
              ERRORS=1
            fi

            # Check name length (max 64 chars per spec)
            NAME_LEN=${#NAME}
            if [ "$NAME_LEN" -gt 64 ]; then
              echo "::error file=$skill_md::name exceeds 64 chars ($NAME_LEN chars)"
              ERRORS=1
            fi

            # Check 'description' field exists and is within limits
            DESC=$(echo "$FRONTMATTER" | grep '^description:' | sed 's/description: *//')
            if [ -z "$DESC" ]; then
              echo "::error file=$skill_md::Missing 'description' field in frontmatter"
              ERRORS=1
            else
              DESC_LEN=${#DESC}
              if [ "$DESC_LEN" -gt 1024 ]; then
                echo "::error file=$skill_md::description exceeds 1024 chars ($DESC_LEN chars)"
                ERRORS=1
              fi
              echo "  ✓ description: ${DESC_LEN} chars"
            fi

            echo "  ✓ Frontmatter valid (name=$NAME)"
          done

          if [ "$ERRORS" -eq 1 ]; then exit 1; fi
          echo "✓ All skills passed structural validation"

      - name: Check SKILL.md line counts
        run: |
          ERRORS=0
          for skill_md in */SKILL.md; do
            LINES=$(wc -l < "$skill_md")
            if [ "$LINES" -gt 500 ]; then
              echo "::error file=$skill_md::Exceeds 500 lines ($LINES lines). Move content to references/"
              ERRORS=1
            else
              echo "✓ $skill_md is $LINES lines (limit: 500)"
            fi
          done
          if [ "$ERRORS" -eq 1 ]; then exit 1; fi

      - name: Validate internal links
        run: |
          for skill_md in */SKILL.md; do
            SKILL_DIR=$(dirname "$skill_md")

            # Check relative links in SKILL.md
            grep -oP '\[.*?\]\(((?!https?://|#).*?)\)' "$skill_md" 2>/dev/null | grep -oP '\(.*?\)' | tr -d '()' | while read -r link; do
              TARGET="$SKILL_DIR/$link"
              if [ ! -f "$TARGET" ] && [ ! -d "$TARGET" ]; then
                echo "::error file=$skill_md::Broken link: $link (resolved to $TARGET)"
              fi
            done

            # Check relative links in reference files
            if [ -d "$SKILL_DIR/references" ]; then
              for ref in "$SKILL_DIR"/references/*.md; do
                [ -f "$ref" ] || continue
                grep -oP '\[.*?\]\(((?!https?://|#).*?)\)' "$ref" 2>/dev/null | grep -oP '\(.*?\)' | tr -d '()' | while read -r link; do
                  TARGET="$SKILL_DIR/references/$link"
                  if [ ! -f "$TARGET" ] && [ ! -d "$TARGET" ]; then
                    echo "::warning file=$ref::Potentially broken link: $link"
                  fi
                done
              done
            fi
          done
          echo "✓ Internal link check complete"

  content-quality:
    name: Content Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract and validate shell code blocks
        run: |
          for skill_md in */SKILL.md; do
            SKILL_DIR=$(dirname "$skill_md")

            # Collect all markdown files in this skill
            MD_FILES="$skill_md"
            if [ -d "$SKILL_DIR/references" ]; then
              MD_FILES="$MD_FILES $(find "$SKILL_DIR/references" -name '*.md' 2>/dev/null)"
            fi

            for md in $MD_FILES; do
              [ -f "$md" ] || continue

              # Extract code blocks marked as bash/shell
              awk '/^```(bash|shell|sh)$/,/^```$/' "$md" | grep -v '^```' > /tmp/code_blocks.sh

              if [ -s /tmp/code_blocks.sh ]; then
                if ! bash -n /tmp/code_blocks.sh 2>/tmp/bash_errors.txt; then
                  if [ -s /tmp/bash_errors.txt ]; then
                    echo "::warning file=$md::Potential shell syntax issues detected (may be false positives from example variables)"
                    cat /tmp/bash_errors.txt
                  fi
                fi
              fi
            done
          done
          echo "✓ Shell code block check complete"

      - name: Check version consistency
        run: |
          for skill_md in */SKILL.md; do
            SKILL_DIR=$(dirname "$skill_md")

            # Extract version from frontmatter
            VERSION=$(sed -n '/^---$/,/^---$/p' "$skill_md" | grep 'version:' | sed 's/.*version: *"\?\([^"]*\)"\?/\1/')
            if [ -n "$VERSION" ]; then
              echo "✓ $SKILL_DIR version: $VERSION"
            fi
          done
          echo "✓ Version check complete"

      - name: Markdown structure check
        run: |
          for skill_md in */SKILL.md; do
            SKILL_DIR=$(dirname "$skill_md")

            # Collect all markdown files
            MD_FILES="$skill_md"
            if [ -d "$SKILL_DIR/references" ]; then
              MD_FILES="$MD_FILES $(find "$SKILL_DIR/references" -name '*.md' 2>/dev/null)"
            fi

            for md in $MD_FILES; do
              [ -f "$md" ] || continue

              # Check for trailing whitespace
              if grep -qn ' $' "$md" 2>/dev/null; then
                echo "::notice file=$md::Trailing whitespace found"
              fi

              # Check heading hierarchy (no skipping levels)
              PREV_LEVEL=0
              grep -n '^#' "$md" | while IFS=: read -r line_num heading; do
                LEVEL=$(echo "$heading" | grep -oP '^#+' | wc -c)
                LEVEL=$((LEVEL - 1))
                if [ "$PREV_LEVEL" -gt 0 ] && [ "$LEVEL" -gt $((PREV_LEVEL + 1)) ]; then
                  echo "::notice file=$md,line=$line_num::Heading level skipped (h$PREV_LEVEL -> h$LEVEL)"
                fi
                PREV_LEVEL=$LEVEL
              done
            done
          done
          echo "✓ Markdown structure check complete"
