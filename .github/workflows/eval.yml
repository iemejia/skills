name: "Tier 3: Skill Eval"

on:
  pull_request:
    paths:
      - "*/SKILL.md"
      - "*/references/**"
      - "tests/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    name: AI Eval (promptfoo via GitHub Models)
    runs-on: ubuntu-latest
    # Only run on non-fork PRs (needs token with models access)
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6

      - name: Cache promptfoo results
        uses: actions/cache@v5
        with:
          path: .promptfoo-cache
          key: ${{ runner.os }}-promptfoo-${{ hashFiles('tests/promptfooconfig.yaml') }}
          restore-keys: |
            ${{ runner.os }}-promptfoo-

      - name: Run promptfoo evaluation
        uses: promptfoo/promptfoo-action@v1
        with:
          # Used by the action to post PR comments and list changed files
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config: 'tests/promptfooconfig.yaml'
          use-config-prompts: 'true'
          cache-path: '.promptfoo-cache'
          no-share: true
          no-progress-bar: true
          fail-on-threshold: '80'
        env:
          # Passed through to promptfoo for GitHub Models API access (provider auth)
          GITHUB_TOKEN: ${{ secrets.COPILOT_PAT }}
